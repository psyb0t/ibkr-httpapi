        '404':
          $ref: '#/components/responses/NotFound'
        '429': *id001
    delete:
      operationId: cancelOrder
      tags:
      - orders
      summary: Cancel a single open order.
      parameters:
      - $ref: '#/components/parameters/OrderIdPath'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelOrderResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429': *id001
  /history/executions:
    get:
      operationId: getExecutions
      tags:
      - history
      summary: Today's executions (broker-side fills feed).
      parameters:
      - $ref: '#/components/parameters/AccountFilter'
      - in: query
        name: clientId
        schema:
          type: integer
          nullable: true
      - in: query
        name: secType
        schema:
          type: string
          nullable: true
      - in: query
        name: symbol
        schema:
          type: string
          nullable: true
      - $ref: '#/components/parameters/ExchangeQuery'
      - in: query
        name: side
        schema:
          type: string
          nullable: true
      - in: query
        name: timeAfter
        schema:
          type: string
          nullable: true
          description: '''YYYYMMDD HH:MM:SS'' UTC'
      - *id002
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionsResponse'
        '429': *id001
  /history/completed_orders:
    get:
      operationId: getCompletedOrders
      tags:
      - history
      summary: Completed orders (today + historical buffer).
      parameters:
      - in: query
        name: apiOnly
        required: false
        schema:
          type: boolean
          default: false
      - *id002
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletedOrdersResponse'
        '429': *id001
components:
  parameters:
    SymbolPath:
      in: path
      name: symbol
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 32
    PairPath:
      in: path
      name: pair
      required: true
      schema:
        type: string
        minLength: 6
        maxLength: 12
    OrderIdPath:
      in: path
      name: orderId
      required: true
      schema:
        type: integer
    ExchangeQuery:
      in: query
      name: exchange
      required: false
      schema:
        type: string
        nullable: true
    ExchangeRequiredQuery:
      in: query
      name: exchange
      required: true
      schema:
        type: string
    CurrencyQuery:
      in: query
      name: currency
      required: false
      schema:
        type: string
        nullable: true
    PrimaryExchangeQuery:
      in: query
      name: primaryExchange
      required: false
      schema:
        type: string
        nullable: true
    OptionExpiryQuery:
      in: query
      name: expiry
      required: true
      schema:
        type: string
        description: YYYYMMDD or YYYYMM
    OptionStrikeQuery:
      in: query
      name: strike
      required: true
      schema:
        type: number
    OptionRightQuery:
      in: query
      name: right
      required: true
      schema:
        type: string
        description: C/P (or CALL/PUT)
    OptionMultiplierQuery:
      in: query
      name: multiplier
      required: false
      schema:
        type: string
        nullable: true
    TradingClassQuery:
      in: query
      name: tradingClass
      required: false
      schema:
        type: string
        nullable: true
    FuturesExpiryQuery:
      in: query
      name: expiry
      required: true
      schema:
        type: string
        description: YYYYMM or YYYYMMDD
    DurationQuery:
      in: query
      name: duration
      required: true
      schema:
        type: string
        description: 'IBKR duration: ''60 S'' / ''1 D'' / ''13 W'' / ''6 M'' / ''1 Y'''
    BarSizeQuery:
      in: query
      name: barSize
      required: false
      schema:
        type: string
        nullable: true
        description: '''1h'' / ''1d'' / ''15m'' etc.'
    EndDateTimeQuery:
      in: query
      name: endDateTime
      required: false
      schema:
        type: string
        nullable: true
        description: ''''' for now, or ''YYYYMMDD HH:MM:SS'' UTC'
    StartDateTimeQuery:
      in: query
      name: startDateTime
      required: false
      schema:
        type: string
        nullable: true
    NumberOfTicksQuery:
      in: query
      name: numberOfTicks
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 1000
    WhatToShowQuery:
      in: query
      name: whatToShow
      required: false
      schema:
        type: string
        nullable: true
        description: TRADES / MIDPOINT / BID / ASK / ...
    UseRTHQuery:
      in: query
      name: useRTH
      required: false
      schema:
        type: boolean
        default: false
    AccountFilter:
      in: query
      name: account
      required: false
      schema:
        type: string
        nullable: true
    RefreshQuery:
      in: query
      name: refresh
      required: false
      description: |
        Bypass the on-disk cache for this request. The fetched value is still written back to the cache so subsequent requests benefit. Default false — caching is transparent and recommended.
      schema:
        type: boolean
        default: false
  responses:
    NotFound:
      description: Contract / order / account not found upstream.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    BadRequest:
      description: Request rejected for validation / business-rule reasons.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UpstreamUnavailable:
      description: An upstream dep (wickworks / IB Gateway) is unreachable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimitNear:
      description: |
        Preemptive rate-limit gate fired before we'd have crossed IBKR's pacing cap. The `details` payload reports which rule tripped, current usage, the configured limit, and a `retry_after_sec` hint. Backoff and retry — IBKR access stays intact. Code = `RATE_LIMIT_NEAR`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ErrorEnvelope:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Stable UPPER_SNAKE_CASE machine-readable identifier.
        message:
          type: string
        details:
          type: object
          nullable: true
          additionalProperties: true
    PingResponse:
      type: object
      required:
      - status
      - connected
      properties:
        status:
          type: string
          examples:
          - ok
        connected:
          type: boolean
        serverVersion:
          type: integer
          nullable: true
        startTime:
          type: string
          nullable: true
        uptimeSeconds:
          type: number
          nullable: true
        msgsSent:
          type: integer
          nullable: true
        msgsRecv:
          type: integer
          nullable: true
    AccountsList:
      type: object
      required:
      - accounts
      properties:
        accounts:
          type: array
          items:
            type: string
    AccountSummaryEntry:
      type: object
      additionalProperties:
        type: object
        properties:
          value:
            type: string
          currency:
            type: string
          modelCode:
            type: string
    AccountSummary:
      type: object
      required:
      - accounts
      properties:
        accounts:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AccountSummaryEntry'
    Position:
