      tags:
      - stocks
      summary: Historical OHLC bars.
      parameters:
      - $ref: '#/components/parameters/SymbolPath'
      - $ref: '#/components/parameters/DurationQuery'
      - $ref: '#/components/parameters/BarSizeQuery'
      - $ref: '#/components/parameters/EndDateTimeQuery'
      - $ref: '#/components/parameters/WhatToShowQuery'
      - $ref: '#/components/parameters/UseRTHQuery'
      - $ref: '#/components/parameters/ExchangeQuery'
      - $ref: '#/components/parameters/CurrencyQuery'
      - $ref: '#/components/parameters/PrimaryExchangeQuery'
      - *id002
      responses:
        '200':
