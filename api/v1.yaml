openapi: 3.1.0
info:
  title: ibkr-httpapi
  description: |
    HTTP wrapper over Interactive Brokers via ib_async + a Linux-native IB
    Gateway container. Asset-class routed: /stocks, /options, /futures,
    /cfd, /forex, /crypto plus cross-cutting /orders, /positions,
    /account, /history.

    Versioning: Option B per ~/.claude/rule-details/designing-an-api.md —
    paths in this spec are unversioned; the runtime prefix `/v1` comes
    from `servers.url`. One spec per major version.
  version: 1.0.0
  license:
    name: WTFPL
servers:
- url: /v1
  description: This deployment's v1 API. Prefix is fixed.
tags:
- name: system
  description: Health + account-level data
- name: stocks
  description: STK contracts + ticks + bars
- name: options
  description: OPT contracts + chains + Greeks + exercise + combo orders
- name: futures
  description: FUT contracts + bars
- name: cfd
  description: CFD contracts + bars
- name: forex
  description: CASH currency-pair contracts + bars
- name: crypto
  description: CRYPTO contracts + bars
- name: orders
  description: Cross-asset order entry / list / cancel
- name: history
  description: Execution + fill history
paths:
  /ping:
    get:
      operationId: getPing
      tags:
      - system
      summary: Liveness + IBKR Gateway connection state.
      responses:
        '200':
          description: API up; `connected` says whether the upstream gateway socket is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
  /accounts:
    get:
      operationId: listAccounts
      tags:
      - system
      summary: List every IBKR account the logged-in user can trade.
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsList'
  /account:
    get:
      operationId: getAccountSummary
      tags:
      - system
      summary: Account summary fields (balance, equity, margin, ...).
      parameters:
      - $ref: '#/components/parameters/AccountFilter'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSummary'
        '404':
          $ref: '#/components/responses/NotFound'
  /account/values:
    get:
      operationId: getAccountValues
      tags:
      - system
      summary: Raw account-values stream (more fields than the summary).
      parameters:
      - $ref: '#/components/parameters/AccountFilter'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSummary'
  /positions:
    get:
      operationId: listPositions
      tags:
      - system
      summary: All open positions across the logged-in user's accounts.
      parameters:
      - $ref: '#/components/parameters/AccountFilter'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionsList'
  /stocks/{symbol}:
    get:
      operationId: getStockContract
      tags:
      - stocks
      summary: Stock contract details.
      parameters:
      - $ref: '#/components/parameters/SymbolPath'
      - $ref: '#/components/parameters/ExchangeQuery'
      - $ref: '#/components/parameters/CurrencyQuery'
      - $ref: '#/components/parameters/PrimaryExchangeQuery'
      - &id002
        $ref: '#/components/parameters/RefreshQuery'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractDetailsList'
        '404':
          $ref: '#/components/responses/NotFound'
        '429': &id001
          $ref: '#/components/responses/RateLimitNear'
  /stocks/{symbol}/tick:
    get:
      operationId: getStockTick
      tags:
      - stocks
      summary: Snapshot tick (bid/ask/last + volume/OHLC for the session).
      parameters:
      - $ref: '#/components/parameters/SymbolPath'
      - $ref: '#/components/parameters/ExchangeQuery'
      - $ref: '#/components/parameters/CurrencyQuery'
      - $ref: '#/components/parameters/PrimaryExchangeQuery'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticker'
        '429': *id001
  /stocks/{symbol}/rates:
    get:
